<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <style>
      .logo-text { font-family: 'Georgia', 'Times New Roman', serif; font-weight: 400; }
      .logo-sub { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 300; }
    </style>
  </defs>
  
  <!-- Subtle line separator -->
  <line x1="0" y1="72" x2="800" y2="72" stroke="#C8674B" stroke-width="1" opacity="0.3"/>
  
  <!-- Main wordmark -->
  <text x="400" y="55" text-anchor="middle" class="logo-text" font-size="52" fill="#2C2C2C" letter-spacing="14">MONNAT</text>
  <text x="400" y="95" text-anchor="middle" class="logo-text" font-size="52" fill="#2C2C2C" letter-spacing="14">LIVING</text>
  
  <!-- Thin terracotta accent line -->
  <line x1="260" y1="112" x2="540" y2="112" stroke="#C8674B" stroke-width="1.5"/>
  
  <!-- Tagline -->
  <text x="400" y="140" text-anchor="middle" class="logo-sub" font-size="12" fill="#8A9A8A" letter-spacing="6">LUXE WITHIN REACH</text>
</svg>